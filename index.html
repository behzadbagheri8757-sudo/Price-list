<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حبوبات و خشکبار باقری | لیست قیمت روز</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&amp;display=swap');
        
        :root {
            --primary: #0a0a0a;
            --secondary: #141414;
            --card: rgba(24, 22, 18, 0.55);
            --gold: #d4af37;
            --gold-light: #f2d675;
            --gold-dim: #8a7328;
            --accent: #166534;
            --accent-light: #6ee7a0;
            --text: #f5f1e6;
            --text-muted: #b8ae95;
            --border: rgba(212, 175, 55, 0.25);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at top, #1a1a1a 0%, #0a0a0a 55%, #050505 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        header {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid var(--gold-dim);
            box-shadow: 0 1px 0 rgba(212, 175, 55, 0.55), 0 8px 24px -12px rgba(0,0,0,0.6);
            padding: 1.2rem 0;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            text-align: center;
        }
        
        .header-side {
            flex: 1 1 0;
            display: flex;
        }
        
        .header-side.clock-side {
            justify-content: flex-start;
        }
        
        .header-side.spacer-side {
            justify-content: flex-end;
        }
        
        .header-center {
            flex: 0 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-img {
            width: 180px;
            max-width: 200px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto 0.6rem;
        }
        
        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 0.2px;
            margin-bottom: 0.2rem;
            text-shadow: 0 0 18px rgba(212, 175, 55, 0.2);
        }
        
        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .update-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 3px;
            border-right: 2px solid var(--gold-dim);
            padding-right: 12px;
        }
        
        .search-container {
            max-width: 1200px;
            margin: 1.5rem auto 1.2rem;
            padding: 0 1rem;
        }
        
        .search-box {
            position: relative;
            max-width: 620px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: rgba(20, 18, 14, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1.5px solid var(--border);
            border-radius: 9999px;
            font-size: 1.05rem;
            color: var(--text);
            transition: all 0.25s ease;
        }
        
        .search-input::placeholder {
            color: var(--text-muted);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.18);
        }
        
        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.35rem;
            color: var(--gold-dim);
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 1.5rem;
        }
        
        .bestsellers {
            background: var(--card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
        }
        
        .bestsellers-title {
            font-size: 1.05rem;
            color: var(--gold-light);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .bestsellers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .bestseller-tag {
            background: rgba(212, 175, 55, 0.08);
            color: var(--text);
            padding: 6px 16px;
            border-radius: 9999px;
            border: 1px solid var(--gold-dim);
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        
        .bestseller-tag:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.14);
        }
        
        .table-container {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.35),
                        0 8px 10px -6px rgb(0 0 0 / 0.3);
            border: 1px solid var(--border);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(18, 16, 12, 0.92);
        }
        
        th {
            padding: 1.1rem 1.25rem;
            text-align: right;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--gold-light);
            border-bottom: 2px solid var(--gold-dim);
        }
        
        td {
            padding: 1.25rem 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }
        
        tr:hover {
            background: rgba(212, 175, 55, 0.06);
        }
        
        .product-name {
            font-weight: 500;
            color: var(--text);
            font-size: 1.05rem;
        }
        
        .price-cell {
            font-weight: 700;
            color: var(--accent-light);
            font-size: 1.28rem;
            text-align: left;
            direction: ltr;
            line-height: 1.3;
        }
        
        .unit-text {
            font-size: 0.82rem;
            color: #9adfb6;
            font-weight: 500;
            display: block;
            margin-top: 3px;
        }
        
        .no-results {
            display: none;
            padding: 3.5rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        
        .no-results.show {
            display: block;
        }
        
        @media (max-width: 900px) {
            .logo-img {
                width: 160px;
            }
        }
        
        @media (max-width: 640px) {
            .search-input {
                padding: 13px 16px 13px 46px;
                font-size: 1.02rem;
            }
            
            th, td {
                padding: 1.05rem 1rem;
            }
            
            .price-cell {
                font-size: 1.22rem;
            }
            
            .logo-img {
                width: 130px;
            }
            
            .logo-text {
                font-size: 1rem;
            }
            
            .subtitle {
                font-size: 0.85rem;
            }
            
            .header-content {
                gap: 0.5rem;
            }
            
            .update-info {
                font-size: 0.8rem;
                padding-right: 8px;
            }
            
            #update-time {
                font-size: 0.95rem !important;
            }
            
            #update-date {
                font-size: 0.78rem !important;
            }
        }
    </style>
</head>

            <div class="bestsellers-list" id="bestsellers-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="table-container">
            <table id="price-table">
                <thead>
                    <tr>
                        <th>نام محصول</th>
                        <th style="text-align: left;">قیمت</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="no-results" class="no-results">
                <div style="font-size: 2.8rem; margin-bottom: 12px;">😕</div>
                <div>محصولی یافت نشد</div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let lastUpdate = "";

        function toPersianDigits(num) {
            const persian = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            return num.toString().replace(/\d/g, d => persian[d]);
        }

        function normalizePersian(text) {
            if (!text) return '';
            return text
                .replace(/ي/g, 'ی')
                .replace(/ك/g, 'ک')
                .replace(/[\u200C\u200D]/g, '')
                .trim()
                .toLowerCase();
        }

        function formatPrice(price) {
            return price.toLocaleString('fa-IR');
        }

        
        function updateLiveDateTime() {
            const now = new Date();

            const date = new Intl.DateTimeFormat('fa-IR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }).format(now);

            const time = new Intl.DateTimeFormat('fa-IR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).format(now);

            document.getElementById('update-time').textContent = `🕒 ${time}`;
            document.getElementById('update-date').textContent = `📅 ${date}`;
        }

async function loadData() {
            try {
                // Prevent caching
                const timestamp = new Date().getTime();
                const response = await fetch(`prices.json?t=${timestamp}`);
                if (!response.ok) throw new Error('داده‌ها در دسترس نیستند');
                
                const data = await response.json();
                products = data.products || [];
                products.sort((a, b) => a.name.localeCompare(b.name, 'fa'));
                
                renderBestsellers();
                renderTable(products);
            } catch (e) {
                console.error(e);
                document.getElementById('table-body').innerHTML = `
                    <tr><td colspan="2" style="text-align:center;padding:40px 20px;color:#f87171;">
                        خطا در بارگذاری قیمت‌ها<br>فایل prices.json را بررسی کنید
                    </td></tr>`;
            }
        }

        const bestsellersNames = ["لوبیا چیتی", "عدس", "نخود", "لوبیا سفید", "لپه"];

        function renderBestsellers() {
            const container = document.getElementById('bestsellers-list');
            container.innerHTML = '';
            
            bestsellersNames.forEach(name => {
                const found = products.find(p => p.name.includes(name));
                if (found) {
                    const tag = document.createElement('div');
                    tag.className = 'bestseller-tag';
                    tag.textContent = found.name;
                    container.appendChild(tag);
                }
            });
        }

        function renderTable(filteredProducts) {
            const tbody = document.getElementById('table-body');
            const noResults = document.getElementById('no-results');
            tbody.innerHTML = '';
            
            if (filteredProducts.length === 0) {
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            
            filteredProducts.forEach((product, i) => {
                const row = document.createElement('tr');
                row.style.animation = `fadeIn 0.35s ease ${i * 35}ms forwards`;
                row.innerHTML = `
                    <td class="product-name">${product.name}</td>
                    <td class="price-cell">
                        ${formatPrice(product.price)} تومان
                        <span class="unit-text">هر ${product.unit}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterProducts(query) {
            if (!query || query.length < 1) return products;
            
            const normalizedQuery = normalizePersian(query);
            
            return products.filter(product => {
                const normalizedName = normalizePersian(product.name);
                return normalizedName.includes(normalizedQuery);
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            let timeout;
            
            searchInput.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    const filtered = filterProducts(searchInput.value);
                    renderTable(filtered);
                }, 140);
            });
        }

        // Keyboard support for quick search
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });

        window.onload = function() {
            loadData();
            setupSearch();

            updateLiveDateTime();
            setInterval(updateLiveDateTime, 1000);
        };
    </script>
</body>
</html>
