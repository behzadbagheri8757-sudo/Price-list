<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حبوبات و خشکبار باقری | لیست قیمت روز</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&amp;display=swap');
        
        :root {
            --primary: #1f1f1f;
            --secondary: #2b2b2b;
            --accent: #166534;
            --accent-light: #4ade80;
            --text: #f1f5f9;
            --text-muted: #cbd5e1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, #1f1f1f 0%, #171717 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        header {
            background: rgba(31, 31, 31, 0.98);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid #334155;
            padding: 1.1rem 0;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            text-align: center;
        }
        
        .logo {
            font-size: 1.65rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.2rem;
        }
        
        .subtitle {
            font-size: 1.05rem;
            color: var(--accent-light);
            font-weight: 500;
        }
        
        .update-info {
            margin-top: 0.6rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .search-container {
            max-width: 1200px;
            margin: 1.5rem auto 1.2rem;
            padding: 0 1rem;
        }
        
        .search-box {
            position: relative;
            max-width: 620px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: var(--secondary);
            border: 2px solid #475569;
            border-radius: 9999px;
            font-size: 1.05rem;
            color: white;
            transition: all 0.25s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.25);
        }
        
        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.35rem;
            color: #64748b;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 1.5rem;
        }
        
        .bestsellers {
            background: #1e2937;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 1.2rem;
            border: 1px solid #334155;
        }
        
        .bestsellers-title {
            font-size: 1.05rem;
            color: var(--accent-light);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .bestsellers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .bestseller-tag {
            background: #334155;
            color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        
        .table-container {
            background: var(--secondary);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15),
                        0 8px 10px -6px rgb(0 0 0 / 0.15);
            border: 1px solid #334155;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            position: sticky;
            top: 0;
            z-index: 40;
            background: #1e2937;
        }
        
        th {
            padding: 1.1rem 1.25rem;
            text-align: right;
            font-weight: 600;
            font-size: 1.05rem;
            color: #e2e8f0;
            border-bottom: 2px solid #475569;
        }
        
        td {
            padding: 1.25rem 1.25rem;
            border-bottom: 1px solid #334155;
            transition: background 0.2s ease;
        }
        
        tr:hover {
            background: #334155;
        }
        
        .product-name {
            font-weight: 500;
            color: #f1f5f9;
            font-size: 1.05rem;
        }
        
        .price-cell {
            font-weight: 700;
            color: var(--accent-light);
            font-size: 1.28rem;
            text-align: left;
            direction: ltr;
            line-height: 1.3;
        }
        
        .unit-text {
            font-size: 0.82rem;
            color: #86efac;
            font-weight: 500;
            display: block;
            margin-top: 3px;
        }
        
        .no-results {
            display: none;
            padding: 3.5rem 2rem;
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
        }
        
        .no-results.show {
            display: block;
        }
        
        @media (max-width: 640px) {
            .search-input {
                padding: 13px 16px 13px 46px;
                font-size: 1.02rem;
            }
            
            th, td {
                padding: 1.05rem 1rem;
            }
            
            .price-cell {
                font-size: 1.22rem;
            }
            
            .logo {
                font-size: 1.55rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">حبوبات و خشکبار باقری</div>
            <div class="subtitle">لیست قیمت روز</div>
            <div class="update-info" id="update-info">
                <span>آخرین بروزرسانی:</span>
                <span id="update-date"></span>
            </div>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="search-input" 
                   class="search-input" 
                   placeholder="نام محصول را جستجو کنید...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="main-container">
        <div class="bestsellers">
            <div class="bestsellers-title">پرفروش‌ها</div>
            <div class="bestsellers-list" id="bestsellers-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="table-container">
            <table id="price-table">
                <thead>
                    <tr>
                        <th>نام محصول</th>
                        <th style="text-align: left;">قیمت</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="no-results" class="no-results">
                <div style="font-size: 2.8rem; margin-bottom: 12px;">😕</div>
                <div>محصولی یافت نشد</div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let lastUpdate = "";

        function toPersianDigits(num) {
            const persian = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            return num.toString().replace(/\d/g, d => persian[d]);
        }

        function normalizePersian(text) {
            if (!text) return '';
            return text
                .replace(/ي/g, 'ی')
                .replace(/ك/g, 'ک')
                .replace(/[\u200C\u200D]/g, '')
                .trim()
                .toLowerCase();
        }

        function formatPrice(price) {
            return price.toLocaleString('fa-IR');
        }

        async function loadData() {
            try {
                // Prevent caching
                const timestamp = new Date().getTime();
                const response = await fetch(`prices.json?t=${timestamp}`);
                if (!response.ok) throw new Error('داده‌ها در دسترس نیستند');
                
                const data = await response.json();
                products = data.products || [];
                lastUpdate = data.lastUpdate || "نامشخص";
                
            
                
                document.getElementById('update-date').textContent = lastUpdate;
                renderBestsellers();
                renderTable(products);
            } catch (e) {
                console.error(e);
                document.getElementById('table-body').innerHTML = `
                    <tr><td colspan="2" style="text-align:center;padding:40px 20px;color:#f87171;">
                        خطا در بارگذاری قیمت‌ها<br>فایل prices.json را بررسی کنید
                    </td></tr>`;
            }
        }

        const bestsellersNames = ["لوبیا چیتی", "عدس", "نخود", "لوبیا سفید", "لپه"];

        function renderBestsellers() {
            const container = document.getElementById('bestsellers-list');
            container.innerHTML = '';
            
            bestsellersNames.forEach(name => {
                const found = products.find(p => p.name.includes(name));
                if (found) {
                    const tag = document.createElement('div');
                    tag.className = 'bestseller-tag';
                    tag.textContent = found.name;
                    container.appendChild(tag);
                }
            });
        }

        function renderTable(filteredProducts) {
            const tbody = document.getElementById('table-body');
            const noResults = document.getElementById('no-results');
            tbody.innerHTML = '';
            
            if (filteredProducts.length === 0) {
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            
            filteredProducts.forEach((product, i) => {
                const row = document.createElement('tr');
                row.style.animation = `fadeIn 0.35s ease ${i * 35}ms forwards`;
                row.innerHTML = `
                    <td class="product-name">${product.name}</td>
                    <td class="price-cell">
                        ${formatPrice(product.price)} تومان
                        <span class="unit-text">هر ${product.unit}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterProducts(query) {
            if (!query || query.length < 1) return products;
            
            const normalizedQuery = normalizePersian(query);
            
            return products.filter(product => {
                const normalizedName = normalizePersian(product.name);
                return normalizedName.includes(normalizedQuery);
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            let timeout;
            
            searchInput.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    const filtered = filterProducts(searchInput.value);
                    renderTable(filtered);
                }, 140);
            });
        }

        // Keyboard support for quick search
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });

        window.onload = function() {
            loadData();
            setupSearch();
        };
    </script>
</body>
</html>
